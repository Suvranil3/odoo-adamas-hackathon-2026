<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Prime - Login</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed-variant":"#55442a",
                        "on-primary-fixed-variant":"#3c4858",
                        "inverse-on-surface":"#eef1f6",
                        "on-tertiary":"#ffffff",
                        "outline":"#75777c",
                        "on-secondary":"#ffffff",
                        "surface-tint":"#535f70",
                        "error-container":"#ffdad6",
                        "tertiary":"#241803",
                        "primary-fixed-dim":"#bbc7db",
                        "primary-fixed":"#d7e3f7",
                        "on-secondary-container":"#5f3500",
                        "secondary":"#8b5000",
                        "on-primary-fixed":"#101c2b",
                        "on-primary":"#ffffff",
                        "on-error":"#ffffff",
                        "surface-container":"#ebeef3",
                        "surface-container-high":"#e5e8ed",
                        "inverse-surface":"#2d3135",
                        "on-tertiary-container":"#a99373",
                        "surface-dim":"#d7dadf",
                        "on-primary-container":"#8a97a9",
                        "surface-variant":"#e0e3e8",
                        "tertiary-fixed-dim":"#dcc3a1",
                        "surface-container-lowest":"#ffffff",
                        "surface":"#f7f9ff",
                        "surface-container-low":"#f1f4f9",
                        "on-secondary-fixed-variant":"#6a3c00",
                        "surface-container-highest":"#e0e3e8",
                        "surface-white":"#ffffff",
                        "deep-navy-active":"#121E2F",
                        "on-secondary-fixed":"#2d1600",
                        "background":"#f7f9ff",
                        "on-background":"#181c20",
                        "error":"#ba1a1a",
                        "secondary-fixed":"#ffdcbe",
                        "on-surface":"#181c20",
                        "inverse-primary":"#bbc7db",
                        "secondary-fixed-dim":"#ffb871",
                        "secondary-container":"#f89300",
                        "on-tertiary-fixed":"#261904",
                        "surface-bright":"#f7f9ff",
                        "tertiary-container":"#3b2c14",
                        "tertiary-fixed":"#f9dfbb",
                        "primary-container":"#232f3e",
                        "primary":"#0e1a28",
                        "on-error-container":"#93000a",
                        "on-surface-variant":"#44474c",
                        "outline-variant":"#c5c6cc"
                    }
                }
            }
        };
    </script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="h-screen w-full flex bg-background text-on-surface">

<div class="flex flex-col md:flex-row w-full h-full">

    <!-- Left Side -->
    <div class="w-full md:w-1/2 flex items-center justify-center p-8 md:p-16 lg:p-24 bg-surface-white">

        <div class="w-full max-w-md">

            <div class="mb-12">
                <img src="https://lh3.googleusercontent.com/aida/AP1WRLsOy_fHQl5GngehgD5DWlnmSsCPzWwt8jTlJatm4RdZ05XXZoR5OlhsFTgPVzilm1KlEe3ROD7msniCJBwY_U9AWgjkKyfXzzHrZLfJsxx0D7SK-Voi0WHypcZfRNiWhQauB8CI76vG-QntV0xPJtnLWcUFSEXiYrV32I0HE41rlPsr9hpsjflw2VjNTIBobKtvgMmpSzr_4OniPmtWivlMiEMNnOhvJwxPV-8Ad2EcWDN3ZXQKQd5w50k"
                    style="height:80px">
            </div>

            <div class="mb-8">
                <h1 class="text-3xl font-bold mb-2">Welcome back</h1>
                <p>Please enter your details to sign in.</p>
            </div>

            <form class="space-y-6">

                <div>
                    <label>Email address</label>
                    <div class="relative rounded border border-gray-300 input-focus-ring">
                        <input id="email"
                            class="w-full py-3 px-4 bg-transparent"
                            type="email"
                            placeholder="name@company.com">
                    </div>
                </div>

                <div>
                    <label>Password</label>

                    <div class="relative rounded border border-gray-300 flex items-center input-focus-ring">

                        <input id="password"
                            class="w-full py-3 px-4 bg-transparent"
                            type="password"
                            placeholder="••••••••">

                        <button type="button"
                            onclick="togglePasswordVisibility()"
                            class="absolute right-3">

                            <span id="visibility-icon"
                                class="material-symbols-outlined">
                                visibility
                            </span>

                        </button>

                    </div>

                </div>

                <button
                    class="w-full py-3 bg-primary-container text-white rounded">
                    Log in
                </button>

            </form>

        </div>

    </div>

    <!-- Right Side -->

    <div class="hidden md:block md:w-1/2 right-image"></div>

</div>

<script src="script.js"></script>

</body>
</html>
