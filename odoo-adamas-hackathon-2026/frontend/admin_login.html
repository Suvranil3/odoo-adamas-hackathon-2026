<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background min-h-screen flex text-on-surface font-body-lg antialiased">
    <!-- Left Column: Login Form -->
    <div
        class="w-full lg:w-1/2 flex flex-col justify-center px-margin-mobile sm:px-12 lg:px-24 xl:px-32 bg-slate-100 h-screen overflow-y-auto">
        <div class="max-w-md w-full mx-auto py-12">
            <!-- Logo Header -->
            <div class="mb-12">
                <a href="loginpage.html" aria-label="Go to login page">
                    <img alt="HRMS Prime Logo" class="h-24 w-auto object-contain mb-8" src="assets/logo.png" />
                </a>
                <h1 class="font-display-lg text-display-lg text-primary mb-2">Welcome Admin</h1>
                <p class="font-body-lg text-body-lg text-on-surface-variant">Access your administrative dashboard to
                    manage the HRMS Prime system.</p>
            </div>
            <!-- Login Form -->
            <form action="#" class="space-y-6" method="POST">
                <!-- Email Field -->
                <div>
                    <label class="block font-label-md text-label-md text-primary mb-2" for="email">Admin Email
                        Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline">mail</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest text-on-surface focus:ring-2 focus:ring-secondary-container focus:border-secondary-container transition-colors duration-200"
                            id="email" name="email" placeholder="admin@company.com" required="" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div>
                    <label class="block font-label-md text-label-md text-primary mb-2" for="password">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline">lock</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest text-on-surface focus:ring-2 focus:ring-secondary-container focus:border-secondary-container transition-colors duration-200"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors"
                            type="button">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Options Row -->
                <div class="flex items-center justify-between mt-4">
                    <div class="flex items-center">
                        <input
                            class="h-4 w-4 text-secondary-container focus:ring-secondary-container border-outline-variant rounded-sm cursor-pointer"
                            id="remember-me" name="remember-me" type="checkbox" />
                        <label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer"
                            for="remember-me">
                            Remember me
                        </label>
                    </div>
                    <div class="text-sm">
                        <a class="font-label-sm text-label-sm text-primary hover:text-secondary-container transition-colors duration-200"
                            href="#">
                            Forgot password?
                        </a>
                    </div>
                </div>
                <!-- Submit Button -->
                <div class="pt-4">
                    <button
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-DEFAULT shadow-sm font-title-md text-title-md text-primary bg-secondary-container hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary-container transition-all duration-200"
                        type="submit">
                        Log in as Admin
                    </button>
                </div>

                <div class="pt-2">
                    <a href="master_sign_up.html"
                        class="w-full flex justify-center py-3 px-4 border border-gray-300 rounded-DEFAULT shadow-sm font-title-md text-title-md text-primary bg-white hover:bg-surface-container-lowest transition-all duration-200">Sign
                        up</a>
                </div>

                <!-- Divider -->
                <div class="mt-8 pt-6 border-t border-surface-variant text-center">
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Need access? <a
                            class="font-label-md text-label-md text-primary hover:text-secondary-container transition-colors"
                            href="#">Contact IT Support</a></p>
                </div>
            </form>
        </div>
    </div>
    <!-- Right Column: Hero Image -->
    <div class="hidden lg:block lg:w-1/2 relative h-screen bg-surface-variant">
        <img alt="Modern corporate office interior with glass walls, concrete floors, and a view of the city skyline including the Shard. Natural light floods the space where people are working."
            class="absolute inset-0 h-full w-full object-cover"
            src="https://lh3.googleusercontent.com/aida/AP1WRLt30gs91hB3leX0sDt3-CGLgPrIe5Q8ZIilmsb0-5olTCLfl-wV0js64PilVEms5x-uZujpLzdYrxvc5Nyf2xPTT1eh94EglpHyUh1w0ka6nHtYwRJLGGavjrO9qo8yvRoT0K8nqm3O0znjvLYByukzjkax5dsFv3UJdoKQgxHE6pW1Nk0KLiNu34ffIb_68fx0K_4vtf5zsOl879mdS60u4tywZIjVKWDc1japSjTgqWKsHWad54it-w" />
        <!-- Overlay Gradient for text readability if needed -->
        <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
        <!-- Optional Quote/Branding on Image -->
        <div class="absolute bottom-12 left-12 right-12 text-on-primary">
            <h2 class="font-headline-lg text-headline-lg mb-4">Empowering Global Scale</h2>
            <p class="font-body-lg text-body-lg opacity-90 max-w-lg">Manage your organization's transition processes
                with seamless efficiency and enterprise-grade security.</p>
        </div>
    </div>
</body>

</html>
